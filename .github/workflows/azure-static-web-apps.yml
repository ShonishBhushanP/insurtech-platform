name: Deploy Frontend to Azure Static Web Apps

# Architecture-faithful frontend deploy (deployment diagram 08 — Frontend Tier:
# Azure Static Web Apps + global CDN). Builds the React MFE shell and publishes it to the
# Standard Static Web App 'insurtech-ui-swa'. Add the SWA deployment token as a repo secret:
#   Settings > Secrets and variables > Actions > New repository secret
#   Name:  AZURE_STATIC_WEB_APPS_API_TOKEN
#   Value: az staticwebapp secrets list -n insurtech-ui-swa -g <rg> --query properties.apiKey -o tsv

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

env:
  # Backend URL the UI calls — the Stage 2 Container Apps public gateway.
  VITE_API_BASE: "https://insurtech-gateway.yellowground-3cac53d1.centralindia.azurecontainerapps.io"

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"      # repo-root-relative folder containing package.json
          output_location: "dist"       # Vite build output (relative to app_location)
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
